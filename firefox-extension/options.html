<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>x-img settings</title>
</head>
<body>
  <main>
    <h1>x-img settings</h1>
    <fieldset>
      <legend>Pair with one x-img instance</legend>
      <label for="instance">x-img instance HTTPS URL</label>
      <input id="instance" type="url" placeholder="https://x-img.example">
      <label for="instance-id">Instance identifier</label>
      <input id="instance-id" autocomplete="off">
      <label for="pair">Pairing reference</label>
      <input id="pair" autocomplete="off">
      <button id="save" type="button">Pair</button>
    </fieldset>
    <fieldset>
      <legend>Enable one website</legend>
      <label for="origin">Website origin</label>
      <input id="origin" type="url" placeholder="https://example.org">
      <p>Enabling requests only this exact HTTPS origin. Capture admits only images displayed in the current viewport after a toolbar click; it never opens media or forwards site cookies. Substitution remains fail-open.</p>
      <label><input id="images" type="checkbox" checked> Images</label>
      <label><input id="videos" type="checkbox"> Videos</label>
      <button id="enable" type="button">Enable site</button>
    </fieldset>
    <h2>Enabled sites</h2>
    <ul id="sites"></ul>
    <p id="diagnostic" role="status" aria-live="polite"></p>
    <p id="status" role="status" aria-live="polite"></p>
  </main>
  <script src="options.js"></script>
</body>
</html>
