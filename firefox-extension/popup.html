<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>x-img cache</title>
</head>
<body>
  <main>
    <h1>x-img cache</h1>
    <p id="context">Checking this site…</p>
    <dl>
      <dt>Capture</dt><dd id="capture">Unavailable</dd>
      <dt>Substitution</dt><dd id="substitution">Unavailable</dd>
      <dt>Last result</dt><dd id="result">No cache attempt recorded</dd>
    </dl>
    <p id="evidence"></p>
    <p id="permission">The extension acts only on explicitly enabled HTTPS origins. It does not read site cookies, passwords, history, or authorization headers.</p>
    <button id="run" type="button">Run cache for visible media</button>
    <button id="toggle" type="button">Pause substitution</button>
    <button id="source" type="button">Open x-img source view</button>
    <button id="settings" type="button">Settings</button>
    <p id="status" role="status" aria-live="polite"></p>
  </main>
  <script src="popup.js"></script>
</body>
</html>
