name: Planning quality mirror

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-quality:
    name: Links, JSON, privacy, and version drift
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: State documentation authority
        run: echo 'This workflow is a convenience mirror; the locally built docs/Dockerfile remains the documentation release authority.'
      - name: Run dependency-free quality checks
        run: scripts/quality/check.sh
